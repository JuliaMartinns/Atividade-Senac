<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Cadastro de Participantes</h1>
    <a href="#Informações Básicas">Informações Básicas</a>  |
      <a href="#Preferências">Preferências</a>  | 
      <a href="#Observações">Observações</a>
<hr>
<form>
    <fieldset>
        <legend id="Informações Básicas">Informações Básicas</legend>

        <label>Nome Completo</label><br>
        <input type="text"> <br>
        <br>
        <label>E-mail:</label><br>
        <input type="email" > <br>
        <br>
        <label>CPF:</label><br>
        <input type="text" > <br>
    </fieldset>
</form>
<form>
    <fieldset>
        <legend id="Preferências">Preferências</legend>

        <label>Escolha sua área de interesse:</label><br>
        <br>
        <input type="radio" name="área de interesse" value="Inteligência Artificial"> Inteligência Artificial<br>
        <input type="radio" name="área de interesse" value="Desenvolvimento Web"> Desenvolvimento Web<br>
        <input type="radio" name="área de interesse" value="Games"> Games<br>
<br>

    <label>Selecione os tópicos adicionais desejados:</label> <br>
    <br>
    <input type="checkbox">Machine Learning<br>
    <input type="checkbox">Cloud<br>
    <input type="checkbox">IoT
    </fieldset>
</form>
<form>
    <fieldset>
        <legend id="Observações">Observações</legend>
        <textarea name="observacoes" rows="4" cols="50"></textarea>
    </fieldset>
<br>
</form>
<button type="submit">Enviar cadastro</button>
<hr>
<footer>© 2026 - Evento Acadêmico</footer>
</body>
</html>
